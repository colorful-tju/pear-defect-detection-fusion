# E1 Configuration: Global Detector + Prior-Guided Local Detector
#
# This is a standalone configuration that doesn't require external projects.
# You only need to provide:
# 1. Pre-generated priors data (likelihood.npy, topology_mask.npy)
# 2. Pre-trained model files (global_detector.pt, or train a new local_detector)
# 3. Dataset in YOLO format

experiment_name: e1_global_local

# ============================================================================
# Dataset Configuration
# ============================================================================
dataset:
  # YOLO dataset root directory
  root: /home/robot/yolo/datasets/PearSurfaceDefects

  # YOLO dataset YAML file
  data_yaml: /home/robot/yolo/datasets/PearSurfaceDefects/li_data.yaml

# ============================================================================
# Priors Configuration
# ============================================================================
priors:
  # Directory containing pre-generated priors
  # Structure should be:
  #   priors_root/
  #   ├── manifests/
  #   │   ├── train.json
  #   │   ├── val.json
  #   │   └── test.json
  #   ├── train/
  #   │   └── <image_key>/
  #   │       ├── likelihood.npy
  #   │       ├── topology_mask.npy
  #   │       └── metadata.json
  #   ├── val/
  #   └── test/
  root_dir: outputs/priors

  # Whether to use cached priors
  use_cache: true

# ============================================================================
# Model Paths
# ============================================================================
models:
  # Global detector: Pre-trained YOLO model for full-image detection
  # This should be your baseline model (E0)
  global_detector: models/global_detector.pt

  # Local detector: YOLO model trained on ROI patches
  # This will be trained by this project
  local_detector: outputs/e1_models/local_detector/weights/best.pt

# ============================================================================
# ROI Generation Configuration
# ============================================================================
roi:
  # ROI extraction parameters
  min_area: 100          # Minimum ROI area (pixels)
  max_area: 50000        # Maximum ROI area (pixels)
  expansion_ratio: 0.2   # 20% expansion around ROI

  # Morphological post-processing
  morphology:
    kernel_size: 5       # Morphological kernel size
    operation: closing   # closing or opening

# ============================================================================
# ROI Dataset Construction
# ============================================================================
roi_dataset:
  output_dir: outputs/roi_dataset

  # Label assignment criteria
  label_assignment:
    iou_threshold: 0.3        # IoU threshold for positive ROI
    overlap_ratio: 0.5        # Overlap ratio threshold

  # Hard negative sampling
  hard_negative:
    enabled: true
    likelihood_threshold: 0.5  # Likelihood threshold for hard negatives
    max_ratio: 0.3             # Maximum ratio of hard negatives

# ============================================================================
# Training Configuration
# ============================================================================
training:
  output_dir: outputs/e1_models

  # Training parameters
  epochs: 100
  imgsz: 640
  batch: 32
  device: '0'           # GPU device ('0', '0,1,2,3', or 'cpu')
  workers: 8            # Number of data loading workers

  # Pretrained weights (YOLO base model)
  pretrained: yolo26s.pt

  # Training options
  amp: true             # Automatic Mixed Precision
  cache: true           # Cache images to RAM

  # Wandb logging (optional)
  # Uncomment to enable Wandb tracking
  # project: pear-e1-fusion        # Wandb project name
  # name: local_detector_v1        # Experiment name
  # exist_ok: false                # Allow overwriting existing runs

# ============================================================================
# Inference Configuration
# ============================================================================
inference:
  # Global detector inference
  global:
    conf: 0.25          # Confidence threshold
    iou: 0.45           # NMS IoU threshold

  # Local detector inference (ROI patches)
  local:
    conf: 0.20          # Lower threshold for ROI regions
    iou: 0.45           # NMS IoU threshold

# ============================================================================
# Fusion Configuration
# ============================================================================
fusion:
  method: priority_nms        # priority_nms or confidence_nms
  iou_threshold: 0.5          # IoU threshold for merging
  priority: local             # local, global, or confidence

  # Optional: Score reweighting using likelihood
  score_reweight:
    enabled: false            # Enable for E1+reweight variant
    alpha: 0.5
    beta: 0.5
    aggregation: mean         # mean, max, or weighted_mean

# ============================================================================
# Evaluation Configuration
# ============================================================================
evaluation:
  metrics:
    - mAP50
    - mAP50-95
    - precision
    - recall
    - f1

  per_class: true
  save_predictions: true
  save_dir: outputs/e1_evaluation

# ============================================================================
# Visualization Configuration
# ============================================================================
visualization:
  enabled: true
  show_roi_boxes: true
  show_detections: true

  colors:
    global: [0, 255, 0]       # Green
    local: [255, 0, 0]        # Blue
    merged: [0, 255, 255]     # Yellow

  save_dir: outputs/e1_visualizations

# ============================================================================
# Runtime Configuration
# ============================================================================
runtime:
  num_workers: 8
  log_level: INFO
  log_file: outputs/e1.log
  seed: 42
